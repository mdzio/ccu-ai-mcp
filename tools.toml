[[tool]]
name = 'list_channels_of_device'
description = '''
Lists all channels of a device with ISEID, name, address, room, functional group
and programs referencing the channel.
'''
kind = 'hm-script'
enabled = true
script = '''
! Enumerating channels
object dobj = dom.GetObject({{ .iseid }});
if (dobj && dobj.Type() == OT_DEVICE) {
	WriteLine("Result is a markdown table:");
	WriteLine("| ISEID | Name | Address | Room | Functional group | Used by programs |");
	WriteLine("|---|---|---|---|---|---|");
	string cid;
	integer count = 0;
	foreach (cid, dobj.Channels()) {
		var cobj = dom.GetObject(cid);
		WriteLine("| " # cobj.ID() # " | " # cobj.Name() # " | " # cobj.Address() # " | " # 
			cobj.ChnRoom().Replace("\t", ",") # " | " # 
			cobj.ChnFunction().Replace("\t", ",") # " | " #
			cobj.ChnEnumDPUsagePrograms().Replace("\t", ",") # " |");
		count = count + 1;
	}
	WriteLine("\nFound " # count # " channels.");
} else {
	WriteLine("ERROR: Object with ISEID {{ .iseid }} not found or is not of type OT_DEVICE.");
}
'''

[[tool.parameter]]
name = "iseid"
description = "ISEID of the device"
type = "integer"

# -----------------------------------------------------------------------------
[[tool]]
name = 'list_data_points_of_channel'
description = '''
Lists all data points of a channel with ISEID, name, ... .
'''
kind = 'hm-script'
enabled = true
script = '''
! Enumerating data points
object ch = dom.GetObject({{ .iseid }});
if (ch && (ch.Type() == OT_CHANNEL)) {
	WriteLine("Result is a markdown table:");
	WriteLine("| ISEID | Name | Data type | Operations |");
	WriteLine("|---|---|---|---|");
	string id;
	integer count = 0;
	foreach (id, ch.DPs().EnumUsedIDs()) {
		var dp = dom.GetObject(id);
		var vt = dp.ValueType();
		var st = dp.ValueSubType();
		var vtText = "";
		if (vt == ivtBinary)
		{
			if (st == istAction) { vtText = "ACTION(BOOL)"; }
			else { vtText = "BOOL"; }
		}
		elseif ((vt == ivtFloat) || (vt == ivtScaling)) { vtText = "FLOAT"; }
		elseif (vt == ivtString) { vtText = "STRING"; }
		elseif (vt == ivtByte) { vtText = "INTEGER"; }
		elseif (vt == ivtInteger)
		{
			if (st == istEnum) { vtText = "ENUM(INTEGER)"; }
			else { vtText = "INTEGER"; }
		}
		else { vtText = "UNKNOWN(" # vt # ")"; }
		var ops = dp.Operations();
		var opsText = "";
		if (OPERATION_READ & ops) { opsText = opsText # "READ,"; }
		if (OPERATION_WRITE & ops) { opsText = opsText # "WRITE,"; }
		if (OPERATION_EVENT & ops) { opsText = opsText # "EVENT,"; }
		if (opsText != "") {
			opsText = opsText.Substr(0, opsText.Length() - 1);
		}
		WriteLine("| " # dp.ID() # " | " # dp.HssType() # " | " # vtText # " | " # opsText # " |");
		count = count + 1;
	}
	WriteLine("\nFound " # count # " data points.");
} else {
	WriteLine("ERROR: Object with ISEID {{ .iseid }} not found or is not of type OT_CHANNEL.");
}
'''

[[tool.parameter]]
name = "iseid"
description = "ISEID of the channel"
type = "integer"

