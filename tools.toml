# -----------------------------------------------------------------------------
[[tool]]
name = 'list_system_variables'
description = '''
Enumerates all system variables in the CCU. Returns following properties: ISEID, Name,
Description, Maximum, Unit, Minimum, Operations, Type, Value name 0 (only valid for types
BOOL, ALARM), Value name 1 (only valid for types BOOL, ALARM), Value list (only valid for
type ENUM) and programs referencing the variable.
'''
kind = 'hm-script'
enabled = true
script = '''
! Enumerating system variables
object sysVars = dom.GetObject(ID_SYSTEM_VARIABLES);
if (sysVars) {
	WriteLine("Result is a markdown table:");
	WriteLine("| ISEID | Name | Description | Maximum | Unit | Minimum | Type | Value name 0 | Value name 1 | Value list | Used by programs |");
	WriteLine("|---|---|---|---|---|---|---|---|---|---|---|");
	string id;
	integer count = 0;
	foreach (id, sysVars.EnumUsedIDs()) {
		object sv = dom.GetObject(id);
		integer vt = sv.ValueType();
		integer st = sv.ValueSubType();
		string outvt = "UNKNOWN";
		if (vt == ivtBinary) {
			if (st == istBool) {
				outvt = "BOOL";
			} elseif (st == istAlarm) {
				outvt = "ALARM(BOOL)";
			}
		} elseif (vt == ivtInteger) {
			if (st == istEnum) {
				outvt = "ENUM(INTEGER)";
			}
		} elseif (vt == ivtFloat) {
			outvt = "FLOAT";
		} elseif (vt == ivtString) {
			outvt = "STRING";
		}
		WriteLine("| " # id # " | " # sv.Name() # " | " # sv.DPInfo() # " | " # sv.ValueMax() # " | " #
			sv.ValueUnit() # " | " # sv.ValueMin() # " | " # outvt # " | " #
			sv.ValueName0() # " | " # sv.ValueName1() # " | " # sv.ValueList() # " | " #
			sv.DPEnumUsagePrograms().Replace("\t", ",") # " |");
		count = count + 1;
	}
	WriteLine("\nFound " # count # " system variables.");
} else {
	WriteLine("ERROR: Object with ISEID ID_SYSTEM_VARIABLES not found.");
}
'''

# -----------------------------------------------------------------------------
[[tool]]
name = 'read_data_points'
description = '''
Reads values from multiple data points. Returns read result (OK or ERROR), value and timestamp
for each data point.
'''
kind = 'hm-script'
enabled = true
script = '''
! Reading multiple data points
WriteLine("Result is a markdown table:");
WriteLine("| ISEID | Read result | Value | Timestamp |");
WriteLine("|---|---|---|---|");
string id; foreach(id,"{{range $i, $e := .iseids}}{{if $i}}\t{{end}}{{$e}}{{end}}") {
	var dp=dom.GetObject(id);
	if (dp) {
		if (dp.IsTypeOf(OT_DP) || dp.IsTypeOf(OT_VARDP) || dp.IsTypeOf(OT_ALARMDP)) {
			WriteLine("| " # id # " | OK | " # dp.Value().ToString().Replace("\n", "<br>") # " | " # dp.Timestamp() # " |");
		} else {
			WriteLine("| " # id # " | ERROR: Object has wrong type |  |  |");
		}
	} else {
		WriteLine("| " # id # " | ERROR: ISEID not found |  |  |");
	}
}
'''

[[tool.parameter]]
name = "iseids"
description = "List of ISEIDs of data points to read"
type = "integer[]"

# -----------------------------------------------------------------------------
[[tool]]
name = 'write_data_point'
description = 'Writes a value to a data point on the CCU.'
kind = 'hm-script'
enabled = true
script = '''
! Writing data point
var sv=dom.GetObject({{ .iseid }});
if (sv) {
	if (sv.IsTypeOf(OT_DP) || sv.IsTypeOf(OT_VARDP) || sv.IsTypeOf(OT_ALARMDP)) {
		sv.State({{ printf "%#v" .value }});
		WriteLine("OK"); 
	} else {
		WriteLine("ERROR: Object with ISEID {{ .iseid }} is not of type DP, VARDP or ALARMDP.");
	}
} else {
	WriteLine("ERROR: Object with ISEID {{ .iseid }} not found.");
}
'''

[[tool.parameter]]
name = "iseid"
description = "ISEID of the data point"
type = "integer"

[[tool.parameter]]
name = "value"
description = "Value to write to the data point"
type = "any"

