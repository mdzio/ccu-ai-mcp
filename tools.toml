}
WriteLine("\nFound " # count # " active alarm messages.");
'''

# -----------------------------------------------------------------------------
[[tool]]
name = 'read_system_info'
description = '''
Returns information about the CCU, e.g. CCU firmware version, product type,
platform, ReGaHss build label, file system, uptime, ram usage.
'''
kind = 'hm-script'
enabled = true
script = '''
! Reading system info
string stdout;
WriteLine("ReGaHss build label: " # dom.BuildLabel());
WriteLine("Content of file /VERSION:");
system.Exec("cat /VERSION", &stdout);
WriteLine(stdout.Trim());
WriteLine("Output of `df -h`:");
system.Exec("df -h", &stdout);
WriteLine(stdout.Trim());
WriteLine("Output of `uptime`:");
system.Exec("uptime", &stdout);
WriteLine(stdout.Trim());
WriteLine("Output of `free`:");
system.Exec("free", &stdout);
WriteLine(stdout.Trim());
'''

