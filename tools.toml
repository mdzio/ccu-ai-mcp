[[tool]]
name = 'read_service_messages'
description = 'Reads all active device service messages (e.g. unreachable, battery low).'
kind = 'hm-script'
enabled = true
script = '''
! Enumerating service messages
WriteLine("Result is a markdown table:");
WriteLine("| ISEID Alarm DP | ISEID Device | Device name | Device type | Service message | Since | Last occurrence |");
WriteLine("|---|---|---|---|---|---|---|");
string index;
integer count = 0;
foreach(index, dom.GetObject(ID_SERVICES).EnumIDs())
{
    object otmp = dom.GetObject(index);
    if (otmp && otmp.IsTypeOf(OT_ALARMDP) && (otmp.AlState() == asOncoming))
    {
        object trigdp = dom.GetObject(otmp.AlTriggerDP());
        object och = dom.GetObject(trigdp.Channel());
        object odev = dom.GetObject(och.Device());
        string name = odev.Name();
        string type = odev.HssType();
        string message = trigdp.HssType();
        WriteLine("| " # index # " | " # odev.ID() # " | " # name # " | " # type # " | " # message # " | " # otmp.AlOccurrenceTime() # " | " # otmp.Timestamp() # " |");
        count = count + 1;
    }
}
WriteLine("\nFound " # count # " active service messages.");
'''

