# -----------------------------------------------------------------------------
[[tool]]
name = 'update_program'
description = 'Updates properties of a CCU program (e.g. name, description, active, visible, operable).'
kind = 'hm-script'
enabled = true
script = '''
integer programID = {{ .programID }};
object oProgram = dom.GetObject(programID);
if (oProgram) {
    if (!oProgram.IsTypeOf(OT_PROGRAM)) { WriteLine("ERROR: Object with ISEID " # programID # " is not a program."); quit; }
{{if .newName }} 
    string newName = {{ printf "%q" .newName }};
    if (!oProgram.Name(newName)) { WriteLine("ERROR: Failed to set name for program with ISEID " # programID); quit; }
    WriteLine("Update of program name succeeded.");
{{end}}
{{if .newDescription}}
    string newDescription = {{ printf "%q" .newDescription }};
    oProgram.PrgInfo(newDescription);
    WriteLine("Update of program description succeeded.");
{{end}}
{{if ne .active nil}} 
    if (!oProgram.Active({{ .active }})) { WriteLine("ERROR: Failed to set active flag for program with ISEID " # programID); quit; }
    WriteLine("Update of program active flag succeeded.");
{{end}}
{{if ne .visible nil}} 
    if (!oProgram.Visible({{ .visible }})) { WriteLine("ERROR: Failed to set visible flag for program with ISEID " # programID); quit; }
    WriteLine("Update of program visible flag succeeded.");
{{end}}
{{if ne .operable nil}}
    if ({{ .operable }}) {
        oProgram.UserAccessRights(iulOtherThanAdmin, iarFullAccess);
    } else {
        oProgram.UserAccessRights(iulOtherThanAdmin, iarRead);
    }
    WriteLine("Update of program operable flag succeeded.");
{{end}}
    oProgram.ProgramUpdate();
} else {
  WriteLine("ERROR: Object with ISEID " # programID # " not found.");
}
'''

[[tool.parameter]]
name = "programID"
description = "ISEID of the CCU program"
type = "integer"

[[tool.parameter]]
name = "newName"
description = "New name for the program"
type = "string"
optional = true

[[tool.parameter]]
name = "active"
description = "Whether the program is active"
type = "boolean"
optional = true

[[tool.parameter]]
name = "visible"
description = "Whether the program is visible in the UI"
type = "boolean"
optional = true

[[tool.parameter]]
name = "operable"
description = "Whether the program is operable by non-admin users"
type = "boolean"
optional = true

[[tool.parameter]]
name = "newDescription"
description = "New description for the program"
type = "string"
optional = true
